design_task:
  description: >
    Take the high level requirements described here and prepare a DESING in markdown format for the backend engineer.
    Everything should be in 1 python module, but outline the classes and methods in the module.
    Here are the requirements: {requirements}
    IMPORTANT: Only output the design in markdown format, **no code**, laying out in detail the classes and functions in the module, describing the functionality.
    BEFORE saving a file you need clean all traces of reasoning <think>...</think>, AND you need delete <think></think> tags
  expected_output: >
    A detailed design for the engineer, identifying the classes and functions in the module.
  agent: engineering_lead
  output_file: output/{module_name}_design.md

code_task:
  description: >
    1. Write a python module that implements the design described by the engineering lead, in order to achieve the requirements.
    Here are the requirements: {requirements}
    2. BEFORE testing and saving a module file you need clean all backticks, for example ```python  in start and ``` of end of code, ALSO you need clean all traces of reasoning <think>...</think>, AND you need delete <think></think> tags    
    3. You must test code for robustnes with Tool Name: Code Interpreter. Tool have a parameters: 'code':'string', libraries_used: 'list[str]'
  expected_output: >
    A python module that implements the design and achieves the requirements.
    IMPORTANT: 
    1. Output ONLY the raw Python code without any markdown formatting, code block delimiters, or backticks, for example ```python  in start and ``` of end of code.
    2. The output should be valid Python code that can be directly saved to a file and executed. CHECK it an twise
  agent: backend_engineer
  context:
    - design_task
  output_file: output/{module_name}

frontend_task:
  description: >
    1. Write a UI in a module app.py that demonstrates the given backend class in {module_name}.
    Assume there is only 1 user, and keep the UI very simple indeed - just a prototype or demo, but all function on UI must be usable, no dummy buttons or fields
    Here are the requirements: {requirements}
    2. BEFORE saving a module file you need clean all backticks, for example ```python  in start and ``` of end of code, ALSO you need clean all traces of reasoning <think>...</think>, AND you need delete <think></think> tags 
  expected_output: >
    A UI in module app.py that demonstrates the given backend class.
    The file should be ready so that it can be run as-is, in the same directory as the backend module, and it should import the backend class from {module_name}.
    IMPORTANT: 
    1. Output ONLY the raw Python code WITHOUT any markdown formatting, code block delimiters, or backticks, for example ```python  in start and ``` of end of code.
    2. The output should be valid Python code that can be directly saved to a file and executed. CHECK it an twise
  agent: frontend_engineer
  context:
    - code_task
  output_file: output/app.py
